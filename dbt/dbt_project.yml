name: ecommerce
version: "1.0.0"
config-version: 2

profile: ecommerce

model-paths: ["models"]
test-paths: ["tests"]

# Iceberg JDBC catalog'da namespace otomatik olusmuyor; ilk run'dan once acikca
# yaratiyoruz. IF NOT EXISTS oldugu icin sonraki run'larda no-op.
on-run-start:
  - "CREATE NAMESPACE IF NOT EXISTS lakehouse.silver"
  - "CREATE NAMESPACE IF NOT EXISTS lakehouse.gold"
  # Static data dictionary lives in its own namespace.
  - "CREATE NAMESPACE IF NOT EXISTS lakehouse.meta"

models:
  ecommerce:
    staging:
      # Staging views default Spark catalog'da kalir; her dbt run'da yeniden
      # olusturulduklari icin (DROP/CREATE VIEW) thrift restart'i sorun degil.
      +materialized: view
      +schema: staging
    core:
      # Silver tablolari Iceberg JDBC catalog'unda -> thrift restart'ina dayanikli,
      # ACID, time travel. Schema 'lakehouse.silver' three-part name uretir.
      +materialized: table
      +file_format: iceberg
      +schema: lakehouse.silver
    mart:
      # Gold tablolari da Iceberg'de.
      +materialized: table
      +file_format: iceberg
      +schema: lakehouse.gold
    meta:
      # Static data dictionary describing every table in the lakehouse (bronze
      # through gold/ops). Hand-maintained literal rows, materialized as an Iceberg
      # table so it is queryable from Thrift / Superset like any other table.
      +materialized: table
      +file_format: iceberg
      +schema: lakehouse.meta
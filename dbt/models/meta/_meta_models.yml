version: 2

models:
  - name: data_dictionary
    description: >
      Static, hand-maintained data dictionary for every table in the lakehouse
      (bronze, staging, silver, gold, ml_features, ml, ops). One row per
      (table_name, column_name) with an English description. Materialized as an
      Iceberg table in lakehouse.meta so it is queryable from Thrift / Superset.
    columns:
      - name: table_name
        description: Fully qualified table name (staging models shown as staging.<model>).
        data_tests:
          - not_null
      - name: column_name
        description: Column name within the table.
        data_tests:
          - not_null
      - name: description
        description: English description of the column.
        data_tests:
          - not_null
